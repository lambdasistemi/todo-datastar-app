name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: [self-hosted, nixos]
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: nix build --quiet

  formatting:
    runs-on: [self-hosted, nixos]
    steps:
      - uses: actions/checkout@v4
      - name: Check formatting
        run: nix develop --quiet -c fourmolu -m check src

  hlint:
    runs-on: [self-hosted, nixos]
    steps:
      - uses: actions/checkout@v4
      - name: Run HLint
        run: nix develop --quiet -c hlint src

  deploy:
    if: >-
      github.event_name == 'push' ||
      github.event.pull_request.head.repo.full_name == github.repository
    needs: [build, formatting, hlint]
    runs-on: [self-hosted, nixos]
    steps:
      - uses: actions/checkout@v4
      - name: Build and load /run/current-system/sw/bin/docker image
        run: |
          nix build .#/run/current-system/sw/bin/docker-image --quiet
          /run/current-system/sw/bin/docker load < result
      - name: Deploy
        run: |
          TAG=$(nix eval .#imageTag --raw)
          cd /home/paolino/services/todo
          sed -i "s/^VERSION=.*/VERSION=$TAG/" .env 2>/dev/null || echo "VERSION=$TAG" > .env
          /run/current-system/sw/bin/docker compose up -d
          echo "Deployed $TAG to todo.dev.plutimus.com"
